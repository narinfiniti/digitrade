apiVersion: 1

datasources:
  - name: Mimir
    uid: mimir
    type: prometheus
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: true
    editable: false
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      httpMethod: GET
      nodeGraph:
        enabled: true
      search:
        hide: false
      serviceMap:
        datasourceUid: mimir
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: true
        spanStartTimeShift: "-15m"
        spanEndTimeShift: "15m"
        tags:
          - key: service.name
            value: service_name
          - key: deployment.environment
            value: deployment_environment
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: "trace_id[=: \"']+([A-Fa-f0-9]{32})"
          name: TraceId
          url: '$${__value.raw}'
          urlDisplayLabel: View Trace
        - datasourceUid: tempo
          matcherRegex: "traceid[=: \"']+([A-Fa-f0-9]{32})"
          name: TraceIdLegacy
          url: '$${__value.raw}'
          urlDisplayLabel: View Trace
