auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
  storage:
    s3:
      endpoint: ${OBS_STORAGE_S3_ENDPOINT}
      bucketnames: ${LOKI_BUCKET}
      access_key_id: ${OBS_STORAGE_ACCESS_KEY_ID}
      secret_access_key: ${OBS_STORAGE_SECRET_ACCESS_KEY}
      s3forcepathstyle: ${OBS_STORAGE_S3_FORCE_PATH_STYLE}
      insecure: ${OBS_STORAGE_S3_INSECURE}

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /loki/compactor
  delete_request_store: s3

limits_config:
  allow_structured_metadata: true
  volume_enabled: true

analytics:
  reporting_enabled: false
