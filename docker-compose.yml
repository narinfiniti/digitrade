name: ${COMPOSE_PROJECT_NAME}

x-api-placeholder: &api-placeholder
  profiles:
    - app-placeholders
  restart: unless-stopped
  environment:
    ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT}
    ASPNETCORE_URLS: http://0.0.0.0:${API_CONTAINER_PORT}
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:${OTEL_GRPC_PORT}
    OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    KafkaIntegrationPublisher__BootstrapServers: kafka:9092
    SWAGGER_OAUTH_CLIENT_ID: ${SWAGGER_OAUTH_CLIENT_ID}
    SWAGGER_OAUTH_CLIENT_SECRET: ${SWAGGER_OAUTH_CLIENT_SECRET}
    SWAGGER_OAUTH_SCOPE: ${SWAGGER_OAUTH_SCOPE}
    SWAGGER_OAUTH_TOKEN_URL: ${SWAGGER_OAUTH_TOKEN_URL}
  healthcheck:
    test:
      - CMD-SHELL
      - dotnet --info > /dev/null || exit 1
    interval: 15s
    timeout: 5s
    retries: 10
    start_period: 45s
  networks:
    - digitrade

x-migration-runner: &migration-runner
  build:
    context: .
    dockerfile: docker/Dockerfile.dotnet-workspace
    args:
      DOTNET_SDK_TAG: ${DOTNET_SDK_TAG}
  image: ${COMPOSE_PROJECT_NAME}/dotnet-workspace:${DOTNET_SDK_TAG}
  profiles:
    - app-placeholders
  working_dir: /workspace
  restart: "no"
  environment:
    ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT}
  volumes:
    - nuget-cache:/root/.nuget/packages
  networks:
    - digitrade

x-observability-storage-env: &observability-storage-env
  OBS_STORAGE_PROVIDER: ${OBS_STORAGE_PROVIDER}
  OBS_STORAGE_S3_ENDPOINT: ${OBS_STORAGE_S3_ENDPOINT}
  OBS_STORAGE_S3_INSECURE: ${OBS_STORAGE_S3_INSECURE}
  OBS_STORAGE_S3_FORCE_PATH_STYLE: ${OBS_STORAGE_S3_FORCE_PATH_STYLE}
  OBS_STORAGE_S3_BUCKET_LOOKUP_TYPE: ${OBS_STORAGE_S3_BUCKET_LOOKUP_TYPE}
  OBS_STORAGE_ACCESS_KEY_ID: ${OBS_STORAGE_ACCESS_KEY_ID}
  OBS_STORAGE_SECRET_ACCESS_KEY: ${OBS_STORAGE_SECRET_ACCESS_KEY}
  MIMIR_BLOCKS_BUCKET: ${MIMIR_BLOCKS_BUCKET}
  MIMIR_RULER_BUCKET: ${MIMIR_RULER_BUCKET}
  MIMIR_ALERTMANAGER_BUCKET: ${MIMIR_ALERTMANAGER_BUCKET}
  LOKI_BUCKET: ${LOKI_BUCKET}
  TEMPO_BUCKET: ${TEMPO_BUCKET}

services:
  redis:
    image: redis:${REDIS_TAG}
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
    ports:
      - ${REDIS_PORT}:6379
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data
    networks:
      - digitrade

  kafka:
    image: bitnamilegacy/kafka:${KAFKA_TAG}
    restart: unless-stopped
    ports:
      - ${KAFKA_PORT}:9092
      - ${KAFKA_CONTROLLER_PORT}:9093
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID}
      ALLOW_PLAINTEXT_LISTENER: yes
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list > /dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - digitrade

  minio:
    image: minio/minio:${MINIO_TAG}
    restart: unless-stopped
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - ${MINIO_API_PORT}:9000
      - ${MINIO_CONSOLE_PORT}:9001
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - digitrade

  minio-create-buckets:
    image: minio/mc:latest
    restart: "no"
    entrypoint: /bin/sh -c
    command: >-
      'if [ "${OBS_STORAGE_PROVIDER}" != "minio" ]; then
        echo "OBS_STORAGE_PROVIDER=${OBS_STORAGE_PROVIDER}, skipping local bucket bootstrap.";
        exit 0;
      fi;
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        echo "Waiting for MinIO alias setup...";
        sleep 2;
      done;
      mc mb --ignore-existing local/${MIMIR_BLOCKS_BUCKET} &&
      mc mb --ignore-existing local/${MIMIR_RULER_BUCKET} &&
      mc mb --ignore-existing local/${MIMIR_ALERTMANAGER_BUCKET} &&
      mc mb --ignore-existing local/${LOKI_BUCKET} &&
      mc mb --ignore-existing local/${TEMPO_BUCKET}'
    networks:
      - digitrade

  mimir:
    image: grafana/mimir:${MIMIR_TAG}
    restart: unless-stopped
    environment:
      <<: *observability-storage-env
    command:
      - -config.file=/etc/mimir/mimir.yml
      - -config.expand-env=true
    ports:
      - ${MIMIR_PORT}:9009
    volumes:
      - ./mimir.yml:/etc/mimir/mimir.yml:ro
      - mimir-data:/data
    depends_on:
      minio-create-buckets:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - /bin/mimir
        - --version
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - digitrade

  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_TAG}
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - ${OTEL_GRPC_PORT}:4317
      - ${OTEL_HTTP_PORT}:4318
      - ${OTEL_HEALTH_PORT}:13133
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test:
        - CMD
        - /otelcol-contrib
        - --version
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      minio-create-buckets:
        condition: service_completed_successfully
      mimir:
        condition: service_started
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - digitrade

  tempo:
    image: grafana/tempo:${TEMPO_TAG}
    restart: unless-stopped
    user: "0:0"
    environment:
      <<: *observability-storage-env
    command:
      - -config.file=/etc/tempo/tempo.yml
      - -config.expand-env=true
    ports:
      - ${TEMPO_PORT}:3200
      - ${TEMPO_OTLP_GRPC_PORT}:4317
      - ${TEMPO_OTLP_HTTP_PORT}:4318
    volumes:
      - ./tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/tmp/tempo
    depends_on:
      minio-create-buckets:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3200/ready > /dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - digitrade

  loki:
    image: grafana/loki:${LOKI_TAG}
    restart: unless-stopped
    environment:
      <<: *observability-storage-env
    command:
      - -config.file=/etc/loki/loki-config.yml
      - -config.expand-env=true
    ports:
      - ${LOKI_PORT}:3100
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    depends_on:
      minio-create-buckets:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3100/ready > /dev/null || exit 1
